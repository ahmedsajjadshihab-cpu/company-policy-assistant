services:
  - type: web
    name: company-policy-assistant-backend
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: company-policy-assistant-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: company-policy-assistant-frontend
    runtime: static
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: company-policy-assistant-backend
          envVarKey: RENDER_EXTERNAL_URL
